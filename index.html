<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="keywords" content="AI algorithm visualizer, ML algorithm visualizer, AI algorithm simulation, ML algorithm simulation, machine learning simulation, artificial intelligence simulation, BFS visualization, DFS visualization, A star search, gradient descent animation, linear regression interactive, logistic regression visualization, machine learning tutorial, algorithm step by step, computer science education" />
  <meta name="author" content="Mahamud Hasan Walid" />
  <meta name="google-site-verification" content="CJcimWYtCujbVSJC2NdV4FoY76W0c0XAn8qpN3IFhuQ" />

  <!-- ── Open Graph (Facebook, LinkedIn, Discord previews) ── -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://walid2851.github.io/ai-ml-visual-notes/" />
  <meta property="og:title"       content="AI / ML Algorithm Visualizer &amp; Simulation — Interactive Visual Notes" />
  <meta property="og:description" content="Free step-by-step simulations and visualizations of BFS, DFS, A*, Gradient Descent, Linear Regression, Logistic Regression and more. For students." />
  <meta property="og:image"       content="https://walid2851.github.io/ai-ml-visual-notes/assets/og-preview.png" />

  <!-- ── Twitter Card ── -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="AI / ML Algorithm Visualizer &amp; Simulation — Interactive Visual Notes" />
  <meta name="twitter:description" content="Free step-by-step interactive simulations of AI and ML algorithms for students." />
  <meta name="twitter:image"       content="https://walid2851.github.io/ai-ml-visual-notes/assets/og-preview.png" />

  <!-- ── Structured Data (JSON-LD) ── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "AI / ML Visual Notes",
    "url": "https://walid2851.github.io/ai-ml-visual-notes/",
    "description": "Free interactive visualizations of AI and ML algorithms for students and developers.",
    "author": { "@type": "Person", "name": "Mahamud Hasan Walid" }
  }
  </script>

  <!-- Favicon — inline SVG graph icon, no file needed -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='6' cy='16' r='5' fill='%237C3AED'/><circle cx='26' cy='6' r='5' fill='%237C3AED'/><circle cx='26' cy='26' r='5' fill='%237C3AED'/><line x1='11' y1='14' x2='21' y2='8' stroke='%237C3AED' stroke-width='2'/><line x1='11' y1='18' x2='21' y2='24' stroke='%237C3AED' stroke-width='2'/></svg>" />

  <!-- JetBrains Mono for pseudocode blocks -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <noscript>
    <style>.noscript-warn{padding:1rem;background:#FEF2F2;color:#991B1B;text-align:center;font-family:sans-serif;border-bottom:2px solid #FCA5A5}</style>
    <div class="noscript-warn">JavaScript is required to use this site. Please enable it in your browser settings.</div>
  </noscript>

  <!-- NAVBAR -->
  <!-- nav.js will inject the navbar here automatically -->
  <script src="components/nav.js"></script>

  <!-- MAIN CONTENT -->
  <main class="container">

    <!-- Hero text -->
    <div class="hero">
      <h1>AI / ML Algorithm Visualizer &amp; Simulation</h1>
      <p>Pick an algorithm to explore it step by step.</p>
    </div>

    <!-- Filter pills: All / AI / ML -->
    <div class="filter-bar">
      <button class="btn filter-btn active" data-filter="all">All</button>
      <button class="btn filter-btn" data-filter="ai">AI</button>
      <button class="btn filter-btn" data-filter="ml">ML</button>
    </div>

    <!-- JS fills this with cards -->
    <div id="card-grid" class="card-grid"></div>

  </main>

  <!-- PAGE SCRIPT -->
  <script>

    // ── 1. Algorithm data ──────────────────────────────────────
    const algorithms = [
      {
        title: "Breadth-First Search (BFS)<br>Depth-First Search (DFS)<br>Uniform-Cost Search (UCS)<br>Iterative Deepening (IDS)<br>A*",
        topic: "Search",
        category: "ai",
        file: "algorithms/ai/search/bfs-dfs-astar.html",
        description: "Uninformed and informed graph search algorithms, step by step.",
        color: "#E8847A",
        icon: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><line x1="15.5" y1="15.5" x2="21" y2="21"/></svg>`,
        done: true,
      },
      {
        title: "Gradient Descent",
        topic: "Optimization",
        category: "ml",
        file: "algorithms/ml/regression/gradient-descent.html",
        description: "A ball rolling down a loss curve — watch how learning rate controls the descent.",
        color: "#F6DE74",
        icon: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,5 8,14 14,10 22,19"/><polyline points="17,19 22,19 22,14"/></svg>`,
        done: true,
      },
      {
        title: "Linear Regression · Polynomial Regression",
        topic: "Regression",
        category: "ml",
        file: "algorithms/ml/regression/linear-regression.html",
        description: "Least squares line fit and polynomial curve fit, both trained with gradient descent.",
        color: "#7DD4F5",
        icon: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="5" cy="17" r="1.5" fill="currentColor" stroke="none"/><circle cx="9" cy="13" r="1.5" fill="currentColor" stroke="none"/><circle cx="14" cy="10" r="1.5" fill="currentColor" stroke="none"/><circle cx="18" cy="6" r="1.5" fill="currentColor" stroke="none"/><line x1="3" y1="21" x2="21" y2="3"/></svg>`,
        done: true,
      },
      {
        title: "Logistic Regression",
        topic: "Classification",
        category: "ml",
        file: "algorithms/ml/regression/logistic-regression.html",
        description: "Sigmoid output and animated decision boundary on a 2-class scatter dataset.",
        color: "#7DDDB0",
        icon: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="6" cy="6" r="2" fill="currentColor" stroke="none"/><circle cx="10" cy="8" r="2" fill="currentColor" stroke="none"/><circle cx="14" cy="16" r="2" fill="currentColor" stroke="none"/><circle cx="18" cy="18" r="2" fill="currentColor" stroke="none"/><line x1="12" y1="2" x2="12" y2="22" stroke-dasharray="3 2"/></svg>`,
        done: true,
      },
      {
        title: "Artificial Neural Network (ANN)",
        topic: "Deep Learning",
        category: "ml",
        file: "algorithms/ml/neural-network/ann.html",
        description: "Fixed 1→2→1 network. Step through forward pass and backpropagation with color-coded equations.",
        color: "#F0A85C",
        icon: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="4" cy="12" r="2.5" fill="currentColor" stroke="none"/><circle cx="12" cy="5" r="2.5" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="2.5" fill="currentColor" stroke="none"/><circle cx="20" cy="12" r="2.5" fill="currentColor" stroke="none"/><line x1="6.5" y1="11" x2="9.5" y2="6.5"/><line x1="6.5" y1="13" x2="9.5" y2="17.5"/><line x1="14.5" y1="6.5" x2="17.5" y2="11"/><line x1="14.5" y1="17.5" x2="17.5" y2="13"/></svg>`,
        done: true,
      },
    ];

    // ── 2. Render cards ────────────────────────────────────────
    function renderCards(filter) {
      const grid = document.getElementById('card-grid');
      const list = filter === 'all'
        ? algorithms
        : algorithms.filter(a => a.category === filter);

      grid.innerHTML = list.map(a => `
        <a class="card ${a.done ? '' : 'card--locked'}"
           style="--card-bg: ${a.color}"
           href="${a.done ? a.file : 'javascript:void(0)'}"
           ${!a.done ? 'aria-disabled="true" tabindex="-1"' : ''}>

          <div class="card-header">
            <div class="card-icon">${a.icon}</div>
            <span class="card-topic">${a.topic}</span>
          </div>

          <h3 class="card-title">${a.title}</h3>
          <p class="card-desc">${a.description}</p>

          <div class="card-cta">
            ${a.done
              ? '<span class="card-btn">Explore →</span>'
              : '<span class="card-btn card-btn--soon">Coming soon</span>'
            }
          </div>

        </a>
      `).join('');
    }

    // ── 3. Filter buttons ──────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCards(btn.dataset.filter);
      });
    });

    // ── 4. First render — respect ?cat= URL param from nav links ──
    const urlCat = new URLSearchParams(location.search).get('cat') || 'all';
    const activeBtn = document.querySelector(`.filter-btn[data-filter="${urlCat}"]`);
    if (activeBtn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      activeBtn.classList.add('active');
    }
    renderCards(urlCat);

  </script>

</body>
</html>
