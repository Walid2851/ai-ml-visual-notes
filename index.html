<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI / ML Visual Notes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <!-- nav.js will inject the navbar here automatically -->
  <script src="components/nav.js"></script>

  <!-- MAIN CONTENT -->
  <main class="container">

    <!-- Hero text -->
    <div class="hero">
      <h1>AI / ML Visual Notes</h1>
      <p>Pick an algorithm to explore it step by step.</p>
    </div>

    <!-- Filter pills: All / AI / ML -->
    <div class="filter-bar">
      <button class="btn filter-btn active" data-filter="all">All</button>
      <button class="btn filter-btn" data-filter="ai">AI</button>
      <button class="btn filter-btn" data-filter="ml">ML</button>
    </div>

    <!-- JS fills this with cards -->
    <div id="card-grid" class="card-grid"></div>

  </main>

  <!-- PAGE SCRIPT -->
  <script>

    // ── 1. Algorithm data ──────────────────────────────────────
    const algorithms = [
      {
        title: "Breadth-First Search (BFS) · Depth-First Search (DFS) · Uniform-Cost Search (UCS) · Iterative Deepening (IDS) · A*",
        topic: "Search",
        category: "ai",
        file: "algorithms/ai/search/bfs-dfs-astar.html",
        description: "Uninformed and informed graph search algorithms, step by step.",
        difficulty: "Beginner",
        week: "1–2",
        done: true,
      },
      {
        title: "N-Queens",
        topic: "Constraint Satisfaction",
        category: "ai",
        file: "algorithms/ai/constraint/nqueens.html",
        description: "Backtracking with constraint propagation on the N-Queens problem.",
        difficulty: "Intermediate",
        week: "3",
        done: false,
      },
      {
        title: "Gradient Descent",
        topic: "Optimization",
        category: "ml",
        file: "algorithms/ml/regression/gradient-descent.html",
        description: "A ball rolling down a loss curve — watch how learning rate controls the descent.",
        difficulty: "Beginner",
        week: "5–6",
        done: true,
      },
      {
        title: "Linear Regression · Polynomial Regression",
        topic: "Regression",
        category: "ml",
        file: "algorithms/ml/regression/linear-regression.html",
        description: "Least squares line fit and polynomial curve fit, both trained with gradient descent.",
        difficulty: "Beginner",
        week: "5–6",
        done: true,
      },
      {
        title: "Logistic Regression",
        topic: "Classification",
        category: "ml",
        file: "algorithms/ml/regression/logistic-regression.html",
        description: "Sigmoid output and animated decision boundary on a 2-class scatter dataset.",
        difficulty: "Beginner",
        week: "5–6",
        done: true,
      },
    ];

    // ── 2. Render cards ────────────────────────────────────────
    function renderCards(filter) {
      const grid = document.getElementById('card-grid');
      const list = filter === 'all'
        ? algorithms
        : algorithms.filter(a => a.category === filter);

      grid.innerHTML = list.map(a => `
        <a class="card ${a.done ? '' : 'card--locked'}"
           href="${a.done ? a.file : '#'}">

          <div class="card-top">
            <span class="card-topic">${a.topic}</span>
            <span class="badge badge-${a.difficulty.toLowerCase()}">${a.difficulty}</span>
          </div>

          <h3 class="card-title">${a.title}</h3>
          <p class="card-desc">${a.description}</p>

          <div class="card-cta">
            ${a.done ? '<span class="card-cta-link">Explore →</span>' : '<span class="card-cta-soon">Coming soon</span>'}
          </div>

        </a>
      `).join('');
    }

    // ── 3. Filter buttons ──────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCards(btn.dataset.filter);
      });
    });

    // ── 4. First render on page load ───────────────────────────
    renderCards('all');

  </script>

</body>
</html>
