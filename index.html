    // ── 2. Render cards ────────────────────────────────────────
    function renderCards(filter) {
      const grid = document.getElementById('card-grid');
      const list = filter === 'all'
        ? algorithms
        : algorithms.filter(a => a.category === filter);

      grid.innerHTML = list.map(a => `
        <a class="card ${a.done ? '' : 'card--locked'}"
           style="--card-bg: ${a.color}"
           href="${a.done ? a.file : 'javascript:void(0)'}"
           ${!a.done ? 'aria-disabled="true" tabindex="-1"' : ''}>

          <div class="card-header">
            <div class="card-icon">${a.icon}</div>
            <span class="card-topic">${a.topic}</span>
          </div>

          <h3 class="card-title">${a.title}</h3>
          <p class="card-desc">${a.description}</p>

          <div class="card-cta">
            ${a.done
              ? '<span class="card-btn">Explore →</span>'
              : '<span class="card-btn card-btn--soon">Coming soon</span>'
            }
          </div>

        </a>
      `).join('');
    }

    // ── 3. Filter buttons ──────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCards(btn.dataset.filter);
      });
    });

    // ── 4. First render — respect ?cat= URL param from nav links ──
    const urlCat = new URLSearchParams(location.search).get('cat') || 'all';
    const activeBtn = document.querySelector(`.filter-btn[data-filter="${urlCat}"]`);
    if (activeBtn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      activeBtn.classList.add('active');
    }
    renderCards(urlCat);

  </script>
